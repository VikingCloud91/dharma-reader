<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dharma Reader</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.88/epub.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #ff9933; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; }
        .hidden { display: none !important; }
        #viewer { height: 75vh; width: 100%; background: white; touch-action: none; }
        .book-card { transition: all 0.3s ease; position: relative; }
        .book-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .delete-btn { position: absolute; top: -10px; right: -10px; background: #ef4444; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; items-center: center; justify-content: center; font-size: 12px; cursor: pointer; border: 2px solid white; z-index: 10; }
        .modal { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="auth-screen" class="flex flex-col items-center justify-center min-h-screen p-6">
        <h1 class="text-5xl font-bold text-[#ff9933] mb-4">Dharma Reader</h1>
        <p class="text-gray-500 mb-10 text-center max-w-sm">Access the sacred wisdom of Sanatan Dharma in your pocket.</p>
        <button id="login-btn" class="bg-white border border-gray-300 px-8 py-4 rounded-full flex items-center shadow-lg hover:shadow-xl transition-all font-semibold">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6 h-6 mr-3" alt="Google">
            Sign in with Google
        </button>
    </div>

    <div id="dashboard" class="hidden min-h-screen">
        <nav class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50">
            <h2 class="text-xl font-black text-[#ff9933] tracking-tighter">DHARMA READER</h2>
            <div class="flex items-center gap-4">
                <button id="admin-upload-trigger" class="hidden bg-[#ff9933] text-white px-4 py-2 rounded-lg text-sm font-bold">Upload Book</button>
                <button onclick="window.signOut()" class="text-xs font-bold text-gray-400 uppercase tracking-widest hover:text-red-500">Logout</button>
            </div>
        </nav>

        <main class="p-4 max-w-6xl mx-auto">
            <div class="flex gap-4 overflow-x-auto pb-4 mb-6 scrollbar-hide">
                <button onclick="window.setTab('all')" id="tab-all" class="px-6 py-2 rounded-full bg-[#ff9933] text-white font-bold shadow-md">All Books</button>
                <div id="collection-tabs" class="flex gap-4"></div>
                <button onclick="window.showCreateCollection()" class="px-4 py-2 rounded-full border-2 border-dashed border-gray-300 text-gray-500 font-bold">+</button>
            </div>

            <div id="book-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
        </main>
    </div>

    <div id="reader-view" class="hidden fixed inset-0 bg-white z-[100] flex flex-col">
        <header class="p-4 border-b flex justify-between items-center bg-white">
            <button onclick="window.closeReader()" class="text-gray-900 font-bold px-4 py-2">✕ Close</button>
            <span id="reading-title" class="font-bold text-sm truncate px-4"></span>
            <button id="add-to-coll" class="text-xs font-bold border rounded-lg px-3 py-1">+ Add to Collection</button>
        </header>
        <div id="viewer" class="flex-1"></div>
        <div class="p-4 border-t flex justify-between bg-gray-50 md:px-20">
            <button onclick="window.prevPage()" class="p-4 rounded-xl bg-white border shadow-sm">← Prev</button>
            <button onclick="window.nextPage()" class="p-4 rounded-xl bg-white border shadow-sm">Next →</button>
        </div>
    </div>

    <div id="modal-container" class="hidden modal">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4">
            <h3 id="modal-title" class="text-xl font-bold mb-4">Message</h3>
            <p id="modal-body" class="text-gray-600 mb-6"></p>
            <button onclick="window.closeModal()" class="w-full bg-[#ff9933] text-white py-3 rounded-xl font-bold">OK</button>
        </div>
    </div>

    <input type="file" id="bookFileHidden" accept=".epub" class="hidden">

    <script>
        const SB_URL = "https://hitxkcalxcofvimcmnca.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpdHhrY2FseGNvZnZpbWNtbmNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwOTk3ODksImV4cCI6MjA5MjY3NTc4OX0.xEwkDKe1D2hGvHL2ZQZzEciOOIlYK5WIngLDLyFsWW0";
        const ADMIN_EMAIL = "405shivpuram@gmail.com";

        const db = supabase.createClient(SB_URL, SB_KEY);
        let rendition = null, currentBook = null, currentUser = null, activeTab = 'all';

        // --- AUTH ---
        document.getElementById('login-btn').addEventListener('click', async () => {
            await db.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + window.location.pathname }
            });
        });

        window.signOut = async () => { await db.auth.signOut(); location.reload(); };

        // --- CORE INIT ---
        async function init() {
            const { data: { session } } = await db.auth.getSession();
            if (session) {
                currentUser = session.user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                if (currentUser.email === ADMIN_EMAIL) document.getElementById('admin-upload-trigger').classList.remove('hidden');
                loadCollections();
                loadLibrary();
            }
        }

        // --- UPLOAD SYSTEM ---
        document.getElementById('admin-upload-trigger').onclick = () => document.getElementById('bookFileHidden').click();

        document.getElementById('bookFileHidden').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const title = prompt("Enter Book Title:", file.name.replace(".epub", ""));
            if (!title) return;

            // Start Upload
            window.showModal("Uploading", "Please wait, your book is being uploaded to the library...");
            
            const fileName = `public/${Date.now()}_${file.name}`;
            const { error: storageErr } = await db.storage.from('epubs').upload(fileName, file);

            if (storageErr) return window.showModal("Error", storageErr.message);

            const { data: urlData } = db.storage.from('epubs').getPublicUrl(fileName);
            const { error: dbErr } = await db.from('books').insert([{ title, file_url: urlData.publicUrl }]);

            if (dbErr) return window.showModal("Error", dbErr.message);
            
            window.showModal("Success", "The book has been successfully uploaded!");
            loadLibrary();
        };

        // --- DELETE BOOK ---
        window.deleteBook = async (e, bookId) => {
            e.stopPropagation();
            if (!confirm("Are you sure you want to delete this book?")) return;
            await db.from('books').delete().eq('id', bookId);
            loadLibrary();
        };

        // --- LIBRARY & COLLECTIONS ---
        async function loadCollections() {
            const { data } = await db.from('collections').select('*');
            const container = document.getElementById('collection-tabs');
            container.innerHTML = data.map(c => `
                <button onclick="window.setTab('${c.id}')" id="tab-${c.id}" class="px-6 py-2 rounded-full bg-white border text-gray-600 font-bold shadow-sm whitespace-nowrap">${c.name}</button>
            `).join('');
        }

        window.showCreateCollection = async () => {
            const name = prompt("Collection Name (e.g., Favorites, Bhagavad Gita):");
            if (name) {
                await db.from('collections').insert([{ user_id: currentUser.id, name }]);
                loadCollections();
            }
        };

        async function loadLibrary() {
            let query = db.from('books').select('*');
            if (activeTab !== 'all') {
                const { data: links } = await db.from('collection_books').select('book_id').eq('collection_id', activeTab);
                const ids = links.map(l => l.book_id);
                query = query.in('id', ids);
            }

            const { data: books } = await query;
            const grid = document.getElementById('book-grid');
            grid.innerHTML = (books || []).map(book => `
                <div class="book-card bg-white p-4 rounded-2xl shadow-sm border text-center" onclick="window.openBook(${JSON.stringify(book).replace(/"/g, '&quot;')})">
                    ${currentUser.email === ADMIN_EMAIL ? `<div class="delete-btn" onclick="window.deleteBook(event, '${book.id}')">✕</div>` : ''}
                    <div class="aspect-[3/4] bg-orange-50 mb-3 flex flex-col items-center justify-center rounded-xl border border-orange-100">
                        <span class="text-[#ff9933] font-black text-xs uppercase tracking-tighter">Dharma</span>
                    </div>
                    <h4 class="font-bold text-sm truncate">${book.title}</h4>
                </div>
            `).join('');
        }

        window.setTab = (id) => {
            activeTab = id;
            document.querySelectorAll('[id^="tab-"]').forEach(btn => btn.className = "px-6 py-2 rounded-full bg-white border text-gray-600 font-bold shadow-sm whitespace-nowrap");
            document.getElementById(`tab-${id}`).className = "px-6 py-2 rounded-full bg-[#ff9933] text-white font-bold shadow-md whitespace-nowrap";
            loadLibrary();
        };

        // --- READER & GESTURES ---
        window.openBook = async (book) => {
            currentBook = book;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('reader-view').classList.remove('hidden');
            document.getElementById('reading-title').innerText = book.title;

            const bookObj = ePub(book.file_url);
            rendition = bookObj.renderTo("viewer", { width: "100%", height: "100%", flow: "paginated", manager: "default" });

            const { data } = await db.from('user_progress').select('last_location').match({ user_id: currentUser.id, book_id: book.id }).maybeSingle();
            rendition.display(data?.last_location || undefined);

            // Save Progress
            rendition.on("relocated", (loc) => {
                db.from('user_progress').upsert({ user_id: currentUser.id, book_id: currentBook.id, last_location: loc.start.cfi, updated_at: new Date() });
            });

            // Touch Gestures for mobile
            let startX = 0;
            rendition.on("touchstart", e => { startX = e.changedTouches[0].screenX; });
            rendition.on("touchend", e => {
                const endX = e.changedTouches[0].screenX;
                if (startX - endX > 50) window.nextPage();
                if (endX - startX > 50) window.prevPage();
            });
        };

        window.closeReader = () => {
            document.getElementById('reader-view').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            if(rendition) rendition.destroy();
        };

        // --- KEYBOARD SUPPORT ---
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowRight") window.nextPage();
            if (e.key === "ArrowLeft") window.prevPage();
        });

        // --- HELPERS ---
        window.nextPage = () => rendition?.next();
        window.prevPage = () => rendition?.prev();
        window.showModal = (title, body) => {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerText = body;
            document.getElementById('modal-container').classList.remove('hidden');
        };
        window.closeModal = () => document.getElementById('modal-container').classList.add('hidden');

        init();
    </script>
</body>
</html>
