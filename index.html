<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dharma Reader</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.88/epub.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #ff9933; }
        body { font-family: 'Inter', sans-serif; background: #f7fafc; margin: 0; overflow-x: hidden; }
        #viewer { height: 80vh; width: 100%; background: white; }
        .book-card { transition: transform 0.2s; cursor: pointer; }
        .book-card:hover { transform: translateY(-5px); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen" class="flex flex-col items-center justify-center min-h-screen p-4">
        <h1 class="text-4xl font-bold text-[#ff9933] mb-2 text-center">Dharma Reader</h1>
        <p class="text-gray-600 mb-8 text-center">A digital library for family & friends.</p>
        <button id="login-btn" class="bg-white border border-gray-300 px-6 py-3 rounded-lg flex items-center shadow-sm hover:shadow-md transition-all">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6 h-6 mr-3" alt="Google">
            Sign in with Google
        </button>
    </div>

    <div id="dashboard" class="hidden min-h-screen">
        <nav class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-10">
            <h2 class="text-xl font-bold text-[#ff9933]">Dharma Library</h2>
            <button onclick="window.signOut()" class="text-sm text-gray-500 underline">Logout</button>
        </nav>
        <main class="p-4 max-w-5xl mx-auto">
            <div id="admin-panel" class="hidden mb-8 p-6 bg-orange-50 border border-orange-200 rounded-xl">
                <h3 class="font-bold mb-4">Admin: Upload New Book</h3>
                <div class="flex flex-col gap-3 md:flex-row">
                    <input type="text" id="bookTitle" placeholder="Book Title" class="p-2 border rounded flex-1">
                    <input type="file" id="bookFile" accept=".epub" class="p-2 text-sm">
                    <button onclick="window.uploadBook()" id="uploadBtn" class="bg-[#ff9933] text-white px-6 py-2 rounded font-bold hover:bg-orange-600">Upload</button>
                </div>
            </div>
            <div id="book-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </main>
    </div>

    <div id="reader-view" class="hidden fixed inset-0 bg-white z-50 flex flex-col">
        <header class="p-4 border-b flex justify-between items-center">
            <button onclick="window.closeReader()" class="text-gray-600 font-bold">← Back</button>
            <span id="reading-title" class="truncate max-w-[200px] font-medium"></span>
            <div class="w-10"></div>
        </header>
        <div id="viewer" class="flex-1"></div>
        <footer class="p-4 border-t flex justify-between items-center bg-gray-50">
            <button onclick="window.prevPage()" class="px-6 py-2 bg-gray-200 rounded-lg">Prev</button>
            <button onclick="window.nextPage()" class="px-6 py-2 bg-gray-200 rounded-lg">Next</button>
        </footer>
    </div>

    <script>
        // 1. UPDATE THESE VALUES
        const SB_URL = "https://hitxkcalxcofvimcmnca.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpdHhrY2FseGNvZnZpbWNtbmNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwOTk3ODksImV4cCI6MjA5MjY3NTc4OX0.xEwkDKe1D2hGvHL2ZQZzEciOOIlYK5WIngLDLyFsWW0";
        const ADMIN_EMAIL = "405shivpuram@gmail.com";

        // 2. INITIALIZE CLIENT
        const db = supabase.createClient(SB_URL, SB_KEY);
        let rendition = null, currentBook = null, currentUser = null;

        // 3. ATTACH LOGIN EVENT
        document.getElementById('login-btn').addEventListener('click', async () => {
            console.log("Login button clicked!"); // If you don't see this in console, the button is blocked.
            const { data, error } = await db.auth.signInWithOAuth({
                provider: 'google',
                options: { 
                    redirectTo: window.location.origin + window.location.pathname,
                    queryParams: { prompt: 'select_account' }
                }
            });
            if (error) {
                console.error("Auth Error:", error.message);
                alert("Login Error: " + error.message);
            }
        });

        window.signOut = async () => { await db.auth.signOut(); location.reload(); };

        async function init() {
            const { data: { session } } = await db.auth.getSession();
            if (session) {
                currentUser = session.user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                if (currentUser.email === ADMIN_EMAIL) document.getElementById('admin-panel').classList.remove('hidden');
                loadLibrary();
            }
        }

        async function loadLibrary() {
            const { data: books } = await db.from('books').select('*');
            const grid = document.getElementById('book-grid');
            grid.innerHTML = (books || []).map(book => `
                <div class="book-card bg-white p-4 rounded-lg shadow-sm border text-center" onclick="window.openBook(${JSON.stringify(book).replace(/"/g, '&quot;')})">
                    <div class="aspect-[3/4] bg-orange-100 mb-3 flex items-center justify-center rounded">
                        <span class="text-orange-400 font-bold text-xs">EPUB</span>
                    </div>
                    <h4 class="font-bold text-sm truncate">${book.title}</h4>
                </div>
            `).join('');
        }

        window.uploadBook = async () => {
            const file = document.getElementById('bookFile').files[0];
            const title = document.getElementById('bookTitle').value;
            if (!file || !title) return alert("Missing info");
            const fileName = `${Date.now()}_${file.name}`;
            await db.storage.from('epubs').upload(fileName, file);
            const { data: urlData } = db.storage.from('epubs').getPublicUrl(fileName);
            await db.from('books').insert([{ title, file_url: urlData.publicUrl }]);
            location.reload();
        };

        window.openBook = async (book) => {
            currentBook = book;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('reader-view').classList.remove('hidden');
            document.getElementById('reading-title').innerText = book.title;
            const bookObj = ePub(book.file_url);
            rendition = bookObj.renderTo("viewer", { width: "100%", height: "100%", flow: "paginated" });
            const { data } = await db.from('user_progress').select('last_location').match({ user_id: currentUser.id, book_id: book.id }).maybeSingle();
            rendition.display(data?.last_location || undefined);
            rendition.on("relocated", (loc) => {
                db.from('user_progress').upsert({ user_id: currentUser.id, book_id: currentBook.id, last_location: loc.start.cfi, updated_at: new Date() });
            });
        };

        window.closeReader = () => { document.getElementById('reader-view').classList.add('hidden'); document.getElementById('dashboard').classList.remove('hidden'); if(rendition) rendition.destroy(); };
        window.nextPage = () => rendition?.next();
        window.prevPage = () => rendition?.prev();
        init();
    </script>
</body>
</html>
